<title>CleanPep — Vendor Cleanliness Scores Based on Real Lab Data (2026)</title>
<meta name="description" content="Independent ranking of peptide vendors by what their COAs actually prove — residual solvents, TFA, heavy metals, and endotoxins. Data from Finnrick Analytics' 7,829 public tests across 224 vendors.">
<link rel="stylesheet" href="style.css">
<script>
// Simple search filter for featured cards
function filterCards() {
  const input = document.getElementById('searchInput').value.toLowerCase();
  const cards = document.querySelectorAll('.featured-grid .card');
  cards.forEach(card => {
    const vendorName = card.querySelector('.vendor-name').textContent.toLowerCase();
    const parent = card.parentElement;
    parent.style.display = vendorName.includes(input) ? 'block' : 'none';
  });
}
</script>
